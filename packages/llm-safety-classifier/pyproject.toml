[project]
name = "llm-safety-classifier"
version = "0.1.0"
description = "Shared pair safety classifier — canonical [SEP] concatenation and model inference"
requires-python = ">=3.12"
dependencies = [
    "torch>=2.12.0",
    "transformers>=5.10.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llm_safety_classifier"]

[tool.uv]
package = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.16",
]
