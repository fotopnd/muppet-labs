services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gridiron
      POSTGRES_PASSWORD: gridiron
      POSTGRES_DB: gridiron
    ports:
      - "5438:5432"
    volumes:
      - gridiron_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridiron"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gridiron_pgdata:
