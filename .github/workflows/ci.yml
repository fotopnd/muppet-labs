name: CI

on:
  push:
    branches: [main]
    paths:
      - 'projects/red-team-platform/**'
  pull_request:
    branches: [main]
    paths:
      - 'projects/red-team-platform/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/red-team-platform
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: redteam
          POSTGRES_PASSWORD: redteam
          POSTGRES_DB: redteam
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://redteam:redteam@localhost:5432/redteam
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python -m pytest tests/ -x -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/red-team-platform/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - run: pnpm install
      - run: pnpm exec tsc --noEmit
      - run: pnpm vitest run
